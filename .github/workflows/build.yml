name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-appimage:
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build bin-appimage
        run: nix build .#bin-appimage

      - name: Smoke test (Linux)
        run: |
          nix build .#smoke-test --out-link result-smoke -L
          cat result-smoke/smoke-test.log

      - name: Rename AppImage with architecture
        run: |
          arch="${{ matrix.arch }}"
          arch_short="${arch%%-*}"
          src=$(find result/ -name '*.AppImage' -print -quit)
          cp "$src" "logos-basecamp-${arch_short}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: logos-basecamp-*.AppImage

  build-macos-app:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build bin-macos-app
        run: nix build .#bin-macos-app

      - name: Smoke test
        run: |
          nix build .#smoke-test-bundle --out-link result-smoke -L
          cat result-smoke/smoke-test.log

      - name: Package app bundle as tarball
        run: |
          app=$(find result/ -name '*.app' -maxdepth 1 -print -quit)
          tar -czf logos-basecamp-aarch64-unsigned.app.tar.gz -C result "$(basename "$app")"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app-aarch64-darwin
          path: logos-basecamp-aarch64-unsigned.app.tar.gz

  release:
    if: github.event_name == 'push'
    needs: [build-appimage, build-macos-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: appimage-x86_64-linux
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: appimage-aarch64-linux
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: macos-app-aarch64-darwin
          path: artifacts/

      - name: Generate tag
        id: tag
        run: echo "tag=pre-release-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Pre-release ${{ steps.tag.outputs.tag }}
          prerelease: true
          files: |
            artifacts/*.AppImage
            artifacts/*.app.tar.gz
