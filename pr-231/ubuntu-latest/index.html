\n   in basecamp, e.g. the main UI and the package manager UI.\n5. Switch to **Settings \u2192 Modules \u2192 Core Modules** \u2014 the background modules\n   loaded into the runtime (package manager, package downloader, capability\n   module) shown as **(Loaded)** with live CPU/memory stats.\n\nThe app is launched headless (`QT_QPA_PLATFORM=offscreen`) and driven through\nits QML inspector: we wait for elements, click sidebar items and tabs, assert\non the rendered text, and capture a screenshot at each step. Because the app is\nbuilt from the commit under test, a green run is real evidence that this change\nstill produces a launchable dev app whose Settings \u2192 Modules view correctly\nreports the installed plugins and loaded modules.\n\n**What you'll build:** This `logos-basecamp` commit, built as the normal development app (`#app`, inspector-enabled by default) and driven through its sidebar (Applications, Package Manager, Settings \u2192 Modules) to inspect the installed UI plugins and the loaded core modules.\n\n**What you'll learn:**\n\n- How a plain `nix build` of basecamp produces the dev app with its modules and UI plugins baked in alongside the binary\n- How the sidebar navigates between the **Workspace** (MDI), **Applications** catalog, **Package Manager**, and **Settings**\n- How **Settings \u2192 Modules \u2192 UI Modules** lists the apps (UI plugins) installed in basecamp\n- How **Settings \u2192 Modules \u2192 Core Modules** shows which runtime modules are loaded, with live CPU/memory stats\n- How the **Package Manager** sidebar entry opens the bundled `package_manager_ui` plugin directly into the main content area\n- How to drive a headless Qt/QML app with logos-qt-mcp (wait, click, assert) and capture screenshots\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required. No network access is needed \u2014 everything inspected here ships inside the dev build.", "execs": []}, {"md": "## Dev app vs. portable bundle\n\nbasecamp has two main build outputs:\n\n```\n#app              -> result/bin/LogosBasecamp   the development app (this doc-test)\n                     result/modules/ + plugins/  baked in next to the binary\n                     QML inspector ON by default\n\n#bin-bundle-dir   -> the portable, self-contained bundle you ship\n                     (Qt runtime carried inside, inspector OFF)\n```\n\nThis doc-test uses `#app` \u2014 what you get from a plain `nix build` while\ndeveloping basecamp. Its starter modules and UI plugins are installed at\nbuild time into `result/modules/` (core modules) and `result/plugins/`\n(UI plugins), and the app discovers them relative to its own binary on\nlaunch. The **Settings \u2192 Modules** sub-view is the in-app window into both\nlists; the **Package Manager** sidebar entry surfaces the bundled\n`package_manager_ui` plugin directly.", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the app's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "these 17 paths will be fetched (32.8 MiB download, 169.4 MiB unpacked):\n  /nix/store/q7sqwn7i6w2b67adw0bmix29pxg85x3w-bash-5.3p3\n  /nix/store/ddx7976jyll30xjbasghv9jailswprcp-bash-interactive-5.3p3\n  /nix/store/8ksax0a2mxglr5hlk ": {"name": "Exploring Installed Apps and Loaded Modules in the Basecamp Bundle", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Exploring Installed Apps and Loaded Modules in the Basecamp Bundle\n\n> **\u26a0\ufe0f Work in progress.** This doc-test currently only walks the sidebar and\n> opens the package manager. The goal is to also drive a **real install**\n> through the package manager \u2014 open the Package Manager, browse the live\n> catalog, select the **accounts module** and **accounts UI**, click\n> **Install**, and verify they install \u2014 but that flow isn't covered yet.\n> Headless, the catalog never finishes populating (the `getValidVariants`\n> reply doesn't get back to the package-manager-ui backend, so the view stays\n> stuck loading), and finding the catalog rows / Install button by visible\n> text is unreliable. The likely fix is to expose stable **`objectName`s** on\n> those UI elements so the test can target them directly (as it already does\n> for `pmui.BackendStore`), plus an app-side fix for the stuck catalog load.\n\n[`logos-basecamp`](https://github.com/logos-co/logos-basecamp) is the Logos\ndesktop application shell \u2014 a Qt/QML app with a sidebar of section buttons\n(Workspace, Applications, Package Manager, Settings), an in-app **Applications**\ncatalog, and a **Settings** view whose **Modules** sub-tab lists the UI plugins\ninstalled in the app and the core modules loaded into its runtime. This\ndoc-test builds **this** basecamp commit as its real, shippable **portable\nbundle**, launches that bundle headless, and drives its UI to inspect what is\ninstalled and loaded out of the box.\n\nThis is the bundle twin of the dev-app doc-test\n([`basecamp-modules`](./basecamp-modules.md)): the exact same sidebar walk,\nbut driving the self-contained `#bin-bundle-dir` directory you ship instead of\nthe plain `nix build` dev binary. The bundle carries the app, its Qt runtime,\nand a starter set of pre-installed modules/plugins (the main UI, the package\nmanager, package downloader, capability module, and the `package_manager_ui`\nplugin) all inside it \u2014 no `/nix/store` needed at runtime.\n\nThe shipping bundle is `#bin-bundle-dir`, with the QML inspector compiled OFF.\nTo automate the UI here we build the inspector-enabled twin\n(`#bin-bundle-dir-inspector` \u2014 `dirBundler appDistributedWithInspector` in\n`flake.nix`): the *same* bundle, just compiled with the QML inspector switched\non so [`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) can drive it\nheadlessly. The inspector is a compile-time switch \u2014 off in the shipping\nRelease build, on here.\n\nThe flow this doc-test exercises is the everyday \"what's in my app?\" check:\n\n1. Launch the bundle and land on the **Workspace** (the empty MDI tab area).\n2. Open the **Applications** view from the sidebar \u2014 basecamp's catalog of\n   installable apps.\n3. Open the **Package Manager** from the sidebar \u2014 clicking the sidebar entry\n   opens the bundled `package_manager_ui` plugin directly into the main\n   content area.\n4. Open **Settings \u2192 Modules \u2192 UI Modules** \u2014 the apps (UI plugins) installed\n   in basecamp, e.g. the main UI and the package manager UI.\n5. Switch to **Settings \u2192 Modules \u2192 Core Modules** \u2014 the background modules\n   loaded into the runtime (package manager, package downloader, capability\n   module) shown as **(Loaded)** with live CPU/memory stats.\n\nThe bundle is launched headless (`QT_QPA_PLATFORM=offscreen`) and driven through\nits QML inspector: we wait for elements, click sidebar items and tabs, assert\non the rendered text, and capture a screenshot at each step. Because the bundle\nis built from the commit under test, a green run is real evidence that this\nchange still produces a launchable, self-contained app whose Settings \u2192\nModules view reports the installed plugins and loaded modules.\n\n**What you'll build:** This `logos-basecamp` commit, built as the real portable bundle (inspector-enabled `#bin-bundle-dir-inspector`) and driven through its sidebar (Applications, Package Manager, Settings \u2192 Modules) to inspect the installed UI plugins and the loaded core modules.\n\n**What you'll learn:**\n\n- How basecamp's portable `#bin-bundle-dir` packages the app, its Qt runtime, and a starter set of modules into one self-contained directory\n- How the inspector-enabled bundle variant lets logos-qt-mcp drive the real shippable app\n- How the sidebar navigates between the **Workspace** (MDI), **Applications** catalog, **Package Manager**, and **Settings**\n- How **Settings \u2192 Modules \u2192 UI Modules** lists the apps (UI plugins) installed in basecamp\n- How **Settings \u2192 Modules \u2192 Core Modules** shows which runtime modules are loaded, with live CPU/memory stats\n- How the **Package Manager** sidebar entry opens the bundled `package_manager_ui` plugin directly into the main content area\n- How to drive a headless Qt/QML app with logos-qt-mcp (wait, click, assert) and capture screenshots\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The bundle runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required. No network access is needed \u2014 everything inspected here ships inside the bundle.", "execs": []}, {"md": "## Dev app vs. portable bundle\n\nbasecamp has two main build outputs:\n\n```\n#app              -> result/bin/LogosBasecamp   the development app\n                     result/modules/ + plugins/  baked in next to the binary\n                     QML inspector ON by default\n\n#bin-bundle-dir   -> the portable, self-contained bundle you ship (this doc-test)\n                     Qt runtime + modules + plugins carried inside\n                     QML inspector OFF in the shipping build\n```\n\nThis doc-test uses the **bundle** \u2014 the self-contained directory basecamp\nships. Its starter modules and UI plugins are carried inside the bundle\nunder `modules/` (core modules) and `plugins/` (UI plugins), and the app\ndiscovers them relative to its own binary on launch. The\n**Settings \u2192 Modules** sub-view is the in-app window into both lists; the\n**Package Manager** sidebar entry surfaces the bundled\n`package_manager_ui` plugin directly. (The companion\n[`basecamp-modules`](./basecamp-modules.md) doc-test runs the identical\nwalk against the `#app` dev build.)", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the bundle's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Build the basecamp bundle\n\nBuild **this** basecamp commit's portable bundle \u2014 the self-contained\n`#bin-bundle-dir` directory you ship \u2014 and link it as `./result-bundle`. The\nbuild compiles the app and every bundled module/plugin through Nix, so the\nfirst build is slow (subsequent runs hit the cache).\n\n> To automate the UI, the doc-test actually builds the inspector-enabled\n> twin of this bundle (`#bin-bundle-dir-inspector`) \u2014 identical except the\n> QML inspector is compiled in. The inspector is never part of a shipping\n> build; the command shown below is the real `#bin-bundle-dir` one you would\n> run.\n\n> The `` in the URL pins the build to a specific commit: the\n> doc-test runner expands it to a concrete ref. Locally that is this\n> checkout's `HEAD` (see `run.sh`); in CI it is the commit being tested.\n> With no pin it falls back to the latest `master`.", "execs": []}, {"md": "### 2.1 Build the bundle\n\nThis is how you build the portable bundle you ship \u2014 the same command a\nrelease build uses:\n\n```bash\n# From inside the clone this is simply: nix build '.#bin-bundle-dir'\nnix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir' -o result-bundle\n```\n\nThe bundle is self-contained: the launcher lives at\n`result-bundle/bin/LogosBasecamp`, with `lib/` (Qt + app libraries),\n`modules/` (bundled core modules) and `plugins/` (bundled UI plugins)\nall alongside it.\n\n> This doc-test builds the same bundle with the QML inspector enabled so\n> it can automate the UI below. The inspector is **not** part of shipping\n> builds \u2014 `#bin-bundle-dir` (shown above) is what you release.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir-inspector' -o result-bundle", "status": "pass", "exit_code": 0, "output": "warning: ignoring untrusted flake configuration setting 'extra-substituters'.\nPass '--accept-flake-config' to trust it\nwarning: ignoring untrusted flake configuration setting 'extra-trusted-public-keys'.\nPass '--accept-flake-config' to trust it\nevaluation warning: `mesa.drivers` is deprecated, use `mesa` instead\nthese 28 derivations will be built:\n  /nix/store/hdil7ph1yji1bci4l0fglrblivmci800-logos-package-manager-lib-1.0.0.drv\n  /nix/store/yl5w93bp7xfr5mgn84l4bv66z0g16a9a-logos-package_manager-module-lib-1.0.0.drv\n  /nix/store/g2y8fkvajy9116l6dkrdrzzz76lq3ybv-closure-info.drv\n  /nix/store/1lh27y31lcf1kd9v05fa7w3ir9n9h1sm-logos-package_manager-module-lib-bundle-1.0.0.drv\n  /nix/store/nrgnv30309y9piy1xgywfr0p4fvaxxzv-closure-info.drv\n  /nix/store/qh61qm4iyfshxhh3nq675a9bx6psafg0-logos-p n- **Variant B:** freshly-built **`accounts_ui`** + latest-downloaded **`accounts_module`**\n\nEverything is **portable**. A freshly-built component can only coexist in the\nsame process as a downloaded catalog package if both \u2014 and the host \u2014 are the\nportable variant (the dev `#app` / `#install` outputs rpath into `/nix/store`\nand will not load alongside a portable package). So the host is the portable\nbundle (`#bin-bundle-dir-inspector`, the inspector-enabled twin of the shippable\n`#bin-bundle-dir`), the fresh side is built with `#install-portable`, and the\ndownloaded side is the catalog's portable `.lgx`. This is exactly the real\ninstall scenario: a portable bundle with portable packages installed into it.\n\nbasecamp discovers extra modules/plugins from a **user-dir** passed via\n`--user-dir`: anything under `<user-dir>/modules/<name>/` and\n`<user-dir>/plugins/<name>/` is picked up at launch on top of the bundle's\nbaked-in set. We assemble that dir on disk from the fresh build + the download\n(the in-app package manager is **not** driven here \u2014 its catalog refresh stalls\nheadless), then open the Accounts app from the sidebar and create a couple of\nmnemonics. A green run is real evidence that this commit's source build of one\naccounts component still interoperates with the last released version of the\nother.\n\n**What you'll build:** The portable basecamp bundle (inspector-enabled `#bin-bundle-dir-inspector`), plus a freshly-built portable `accounts_module`/`accounts_ui`, combined in a user-dir with the latest released counterpart downloaded from the package manager, and driven through the Accounts app.\n\n**What you'll learn:**\n\n- How `accounts_module` and `accounts_ui` ship as separate packages and why cross-version compatibility needs its own test\n- Why fresh-built and downloaded packages must both be the portable variant to coexist in one process\n- How to build a component portably (`#install-portable`) into a `modules/<name>/` or `plugins/<name>/` layout\n- How to download the latest released package with `lgpd` and install it with `lgpm`\n- How basecamp's `--user-dir` discovers extra modules and UI plugins at launch\n- How to drive the Accounts app headless with logos-qt-mcp (open the app, create mnemonics) and capture screenshots\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.\n- **Network access.** Unlike the other basecamp doc-tests, this one downloads the latest released package from the package manager catalog, so it needs internet access.", "execs": []}, {"md": "## How the cross-version check works\n\nThe accounts feature is two packages that ship separately:\n\n```\naccounts_module   core runtime plugin   -> modules/accounts_module/\naccounts_ui       QML app (depends on accounts_module) -> plugins/accounts_ui/\n```\n\nTo catch drift between them, each variant of this doc-test pins one side to\n**today's source** and the other to the **latest release**:\n\n```\nVariant A : fresh accounts_module   + downloaded accounts_ui\nVariant B : fresh accounts_ui       + downloaded accounts_module\n```\n\nBoth are assembled into a basecamp **user-dir** (`modules/` + `plugins/`),\nand the **portable** bundle is launched with `--user-dir` pointed at it. The\nAccounts app then loads the freshly-built piece next to the released piece in\none process \u2014 which only works because everything is the portable variant.", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the bundle's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Build the package-manager CLIs\n\nThe download/install of the released counterpart is driven by the package\nmanager's CLIs: `lgpd` (downloader) fetches the latest `.lgx` from the\ncatalog, and `lgpm` (manager) installs it into the user-dir. We build them\nfrom their flakes \u2014 `lgpm` from the **portable** CLI (`#cli-portable`), so it\nselects the catalog's portable platform variant rather than a `-dev` one.", "execs": []}, {"md": "### 2.1 Build lgpd (package downloader)\n\n```bash\nnix build 'github:logos-co/logos-package-downloader#cli' -o result-lgpd\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-downloader#cli' -o result-lgpd", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/nix-bundle-appimage/7343f6df1ebab357f51f23dff0af9d7e468638cb?narHash=sha256-UEUlp3VRXBcj2YlOMTQdeW3qjyGJl2V3%2BGMf8IXwSWA%3D' into the Git cache...\nunpacking 'github:logos-co/nix-bundle-dir/cd214dbf15487d80967389847ae2210468be6ebf?narHash=sha256-bpaTvz//R8WFP5xnnDLv3a9l7unDmBwJjCewx3wCjzM%3D' into the Git cache...\nthis path will be fetched (0.0 KiB download, 1.5 MiB unpacked):\n  /nix/store/wb35xkjh8vn7bigcg9ij6qwhr2ipjg3a-logos-package-downloader-cli-1.0.0\ncopying path '/nix/store/wb35xkjh8vn7bigcg9ij6qwhr2ipjg3a-logos-package-downloader-cli-1.0.0' from 'https://cache.nix.logos.co/ci'...\n", "note": ""}]}, {"md": "### 2.2 Build lgpm (package manager, portable)\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli-portable' -o result-lgpm\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli-portable' -o result-lgpm", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: Build the basecamp bundle\n\nBuild **this** basecamp commit's portable bundle and link it as\n`./result-bundle`. This is the self-contained `#bin-bundle-dir` you ship; to\nautomate the UI we build its inspector-enabled twin\n(`#bin-bundle-dir-inspector`) \u2014 identical except the QML inspector is\ncompiled in. The bundle is the **host** the fresh + downloaded portable\npackages load into.\n\n> The `` in the URL pins the build to this commit (the doc-test\n> runner expands it; locally that is this checkout's `HEAD`, see `run.sh`).", "execs": []}, {"md": "### 3.1 Build the bundle\n\n```bash\n# From inside the clone this is simply: nix build '.#bin-bundle-dir'\nnix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir' -o result-bundle\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir-inspector' -o result-bundle", "status": "pass", "exit_code": 0, "output": "warning: ignoring untrusted flake configuration setting 'extra-substituters'.\nPass '--accept-flake-config' to trust it\nwarning: ignoring untrusted flake configuration setting 'extra-trusted-public-keys'.\nPass '--accept-flake-config' to trust it\n", "note": ""}]}, {"md": "## Step 4: Variant A \u2014 fresh accounts_module + latest accounts_ui\n\nBuild `accounts_module` fresh from source as a **portable** install, download\nthe latest released `accounts_ui` from the package manager, and assemble both\ninto the user-dir `./testdata/acc-A`.", "execs": []}, {"md": "### 4.1 Build the fresh accounts_module (portable)\n\n`#install-portable` produces the same `modules/<name>/` layout basecamp\nloads from a user-dir \u2014 a portable plugin plus its metadata.\n\n```bash\nnix build 'github:logos-co/logos-accounts-module#install-portable' -o result-accA-mod\n```", "execs": [{"kind": "run", "cmd": "nix b 014 are the\nportable variant. So the host is the portable bundle\n(`#bin-bundle-dir-inspector`, the inspector-enabled twin of the shippable\n`#bin-bundle-dir`), the fresh side is built with `#install-portable`, and the\ndownloaded side is the catalog's portable `.lgx`.\n\nBoth sides are assembled into a basecamp **user-dir** (discovered via\n`--user-dir`: `<user-dir>/modules/<name>/` + `<user-dir>/plugins/<name>/`), the\nportable bundle is launched against it, the chat app is opened from the sidebar,\nand we wait for it to initialize. A green run is evidence that this commit's\nsource build of one chat component still loads and initializes next to the last\nreleased version of the other.\n\n**What you'll build:** The portable basecamp bundle (inspector-enabled `#bin-bundle-dir-inspector`), plus a freshly-built portable `chat_module`/`chat_ui`, combined in a user-dir with the latest released counterpart downloaded from the package manager, and driven to confirm the chat app initializes.\n\n**What you'll learn:**\n\n- How `chat_module` and `chat_ui` ship as separate packages and why cross-version compatibility needs its own test\n- Why fresh-built and downloaded packages must both be the portable variant to coexist in one process\n- How to build a component portably (`#install-portable`) and download its counterpart with `lgpd`/`lgpm`\n- How basecamp's `--user-dir` discovers extra modules and UI plugins at launch\n- How to confirm the chat app initializes (the Waku node comes up and the UI reaches \"Connected\") headless with logos-qt-mcp\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.\n- **Network access.** This doc-test downloads the latest released package from the package manager catalog, and `chat_module` starts a real Waku node \u2014 both need internet access.", "execs": []}, {"md": "## How the cross-version check works\n\nThe chat feature is two packages that ship separately:\n\n```\nchat_module   core runtime plugin (runs a real Waku node) -> modules/chat_module/\nchat_ui       QML app (depends on chat_module)            -> plugins/chat_ui/\n```\n\nEach variant pins one side to **today's source** and the other to the\n**latest release**:\n\n```\nVariant A : fresh chat_module + downloaded chat_ui\nVariant B : fresh chat_ui     + downloaded chat_module\n```\n\nBoth are assembled into a basecamp **user-dir**, and the **portable** bundle\nis launched with `--user-dir` pointed at it \u2014 so the freshly-built piece\ninitializes next to the released piece in one process.", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the bundle's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Build the package-manager CLIs\n\n`lgpd` (downloader) fetches the latest `.lgx` from the catalog, and `lgpm`\n(manager) installs it into the user-dir. We build them from their flakes \u2014\n`lgpm` from the **portable** CLI (`#cli-portable`), so it selects the\ncatalog's portable platform variant rather than a `-dev` one.", "execs": []}, {"md": "### 2.1 Build lgpd (package downloader)\n\n```bash\nnix build 'github:logos-co/logos-package-downloader#cli' -o result-lgpd\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-downloader#cli' -o result-lgpd", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 2.2 Build lgpm (package manager, portable)\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli-portable' -o result-lgpm\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli-portable' -o result-lgpm", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: Build the basecamp bundle\n\nBuild **this** basecamp commit's portable bundle and link it as\n`./result-bundle` \u2014 the inspector-enabled twin (`#bin-bundle-dir-inspector`)\nof the shippable `#bin-bundle-dir`, the host the fresh + downloaded portable\npackages load into.", "execs": []}, {"md": "### 3.1 Build the bundle\n\n```bash\n# From inside the clone this is simply: nix build '.#bin-bundle-dir'\nnix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir' -o result-bundle\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir-inspector' -o result-bundle", "status": "pass", "exit_code": 0, "output": "warning: ignoring untrusted flake configuration setting 'extra-substituters'.\nPass '--accept-flake-config' to trust it\nwarning: ignoring untrusted flake configuration setting 'extra-trusted-public-keys'.\nPass '--accept-flake-config' to trust it\n", "note": ""}]}, {"md": "## Step 4: Variant A \u2014 fresh chat_module + latest chat_ui\n\nBuild `chat_module` fresh from source as a **portable** install, download the\nlatest released `chat_ui`, and assemble both into `./testdata/chat-A`.", "execs": []}, {"md": "### 4.1 Build the fresh chat_module (portable)\n\n```bash\nnix build 'github:logos-co/logos-chat-module#install-portable' -o result-chatA-mod\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-chat-module#install-portable' -o result-chatA- plugins\n\n```", "execs": [{"kind": "run", "cmd": "chmod -R u+w testdata/chat-A 2>/dev/null || true\nrm -rf testdata/chat-A\nmkdir -p testdata/chat-A/modules testdata/chat-A/plugins\ncp -r result-chatA-mod/modules/chat_module testdata/chat-A/modules/\nchmod -R u+w testdata/chat-A\n./result-lgpm/bin/lgpm --modules-dir testdata/chat-A/modules --ui-plugins-dir testdata/chat-A/plugins install --file dl-chatA/*.lgx\necho \"--- modules ---\"; ls testdata/chat-A/modules\necho \"--- plugins ---\"; ls testdata/chat-A/plugins\n", "status": "pass", "exit_code": 0, "output": "Installing from file: dl-chatA/chat_ui-1.0.0.lgx...Warning: Package is unsigned: dl-chatA/chat_ui-1.0.0.lgx\n done\nInstalled to: testdata/chat-A/plugins\n--- modules ---\nchat_module\n--- plugins ---\nchat_ui\n", "note": ""}]}, {"md": "### 4.4 Launch the bundle and confirm chat initializes\n\nLaunch the portable bundle against `./testdata/chat-A`, open the chat app\nfrom the sidebar, and wait for the chat node to come up \u2014 the released\n`chat_ui` initializing the freshly-built `chat_module`'s Waku node.\n\n```bash\n./result-bundle/bin/LogosBasecamp --user-dir ./testdata/chat-A\n```\n\n![App window opens with the sidebar visible](data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABAAAAAMACAIAAAA12IJaAAAACXBIWXMAAA7EAAAOxAGVKw4bAAAgAElEQVR4nOzdd2AUZf7H8WfKZtOWJEAKJSwQhKVJR6QoVooiqNjAruhZftbzrKeep2fDU+z1CmJXVLB7YkFEpCMldBLSQ0jZlC1Tfn/sZhNCsqQtidn36w/NZmZnv7NZkucz8xQpOTlZNJrFYlFVVZZlSZJ8/238c48C0zQNw/D9V9M0r9fb1hUBAAAA7YvamJ1kWbZarRaLpb21+OuQJElRFN/XERERpml6vV63220YRtsWBgAAALQTRw4AkZGRVqv1KJTS6iRJioiIiIiIcLvdLperrcsBAAAA2l6wACDLcnR0dOCa+h+X1WpVVbWyspJbAQAAAAhzckMbFEWJiYnpAK1/nw52OgAAAEDz1B8AfNf+ZbnBePBH1CFPCgAAAGiS+lvDHbWh7MsAbV0FAAAA0GbqaeVHRkZ24K4yiqJERka2dRUAAABA26gbAHwzfrZJKUeN1WrtkPc3AAAAgCOqOwtQh2/9+1it1qqqqqPzWhaLxWKxyLLcDpdOCxO+teEMw/B6vSwPBwAAwlzdAGCxWNqkjqPMYrEchQBgsVgiIyO529DmfCvEKYpisVgMw3C5XMQAAAAQtg5pm7b/tX5biyRJoY46kZGRHXUs9R+abyA440AAAEDYOuQOgKoeeWHgDkNV1dBdBm7J8skxVmPGsPLkmEipvKdwxQhdFZoiDEno <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
