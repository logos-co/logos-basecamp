alled\n   in basecamp, e.g. the main UI and the package manager UI.\n5. Switch to **Settings \u2192 Modules \u2192 Core Modules** \u2014 the background modules\n   loaded into the runtime (package manager, package downloader, capability\n   module) shown as **(Loaded)** with live CPU/memory stats.\n\nThe app is launched headless (`QT_QPA_PLATFORM=offscreen`) and driven through\nits QML inspector: we wait for elements, click sidebar items and tabs, assert\non the rendered text, and capture a screenshot at each step. Because the app is\nbuilt from the commit under test, a green run is real evidence that this change\nstill produces a launchable dev app whose Settings \u2192 Modules view correctly\nreports the installed plugins and loaded modules.\n\n**What you'll build:** This `logos-basecamp` commit, built as the normal development app (`#app`, inspector-enabled by default) and driven through its sidebar (Applications, Package Manager, Settings \u2192 Modules) to inspect the installed UI plugins and the loaded core modules.\n\n**What you'll learn:**\n\n- How a plain `nix build` of basecamp produces the dev app with its modules and UI plugins baked in alongside the binary\n- How the sidebar navigates between the **Workspace** (MDI), **Applications** catalog, **Package Manager**, and **Settings**\n- How **Settings \u2192 Modules \u2192 UI Modules** lists the apps (UI plugins) installed in basecamp\n- How **Settings \u2192 Modules \u2192 Core Modules** shows which runtime modules are loaded, with live CPU/memory stats\n- How the **Package Manager** sidebar entry opens the bundled `package_manager_ui` plugin directly into the main content area\n- How to drive a headless Qt/QML app with logos-qt-mcp (wait, click, assert) and capture screenshots\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required. No network access is needed \u2014 everything inspected here ships inside the dev build.", "execs": []}, {"md": "## Dev app vs. portable bundle\n\nbasecamp has two main build outputs:\n\n```\n#app              -> result/bin/LogosBasecamp   the development app (this doc-test)\n                     result/modules/ + plugins/  baked in next to the binary\n                     QML inspector ON by default\n\n#bin-bundle-dir   -> the portable, self-contained bundle you ship\n                     (Qt runtime carried inside, inspector OFF)\n```\n\nThis doc-test uses `#app` \u2014 what you get from a plain `nix build` while\ndeveloping basecamp. Its starter modules and UI plugins are installed at\nbuild time into `result/modules/` (core modules) and `result/plugins/`\n(UI plugins), and the app discovers them relative to its own binary on\nlaunch. The **Settings \u2192 Modules** sub-view is the in-app window into both\nlists; the **Package Manager** sidebar entry surfaces the bundled\n`package_manager_ui` plugin directly.", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the app's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "these 14 paths will be fetched (26.0 MiB download, 151.9 MiB unpacked):\n  /nix/store/dgfikfjky3nq6gycpd08fyvmr7ww1j7j-bash-interactive-5.3p3\n  /nix/store/lxzs5j6ywzl51jnd093diy1v9i7260rz-icu4c-76.1\n  /nix/store/0pr4q85wdniz es.md)): the exact same sidebar walk,\nbut driving the self-contained `#bin-bundle-dir` directory you ship instead of\nthe plain `nix build` dev binary. The bundle carries the app, its Qt runtime,\nand a starter set of pre-installed modules/plugins (the main UI, the package\nmanager, package downloader, capability module, and the `package_manager_ui`\nplugin) all inside it \u2014 no `/nix/store` needed at runtime.\n\nThe shipping bundle is `#bin-bundle-dir`, with the QML inspector compiled OFF.\nTo automate the UI here we build the inspector-enabled twin\n(`#bin-bundle-dir-inspector` \u2014 `dirBundler appDistributedWithInspector` in\n`flake.nix`): the *same* bundle, just compiled with the QML inspector switched\non so [`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) can drive it\nheadlessly. The inspector is a compile-time switch \u2014 off in the shipping\nRelease build, on here.\n\nThe flow this doc-test exercises is the everyday \"what's in my app?\" check:\n\n1. Launch the bundle and land on the **Workspace** (the empty MDI tab area).\n2. Open the **Applications** view from the sidebar \u2014 basecamp's catalog of\n   installable apps.\n3. Open the **Package Manager** from the sidebar \u2014 clicking the sidebar entry\n   opens the bundled `package_manager_ui` plugin directly into the main\n   content area.\n4. Open **Settings \u2192 Modules \u2192 UI Modules** \u2014 the apps (UI plugins) installed\n   in basecamp, e.g. the main UI and the package manager UI.\n5. Switch to **Settings \u2192 Modules \u2192 Core Modules** \u2014 the background modules\n   loaded into the runtime (package manager, package downloader, capability\n   module) shown as **(Loaded)** with live CPU/memory stats.\n\nThe bundle is launched headless (`QT_QPA_PLATFORM=offscreen`) and driven through\nits QML inspector: we wait for elements, click sidebar items and tabs, assert\non the rendered text, and capture a screenshot at each step. Because the bundle\nis built from the commit under test, a green run is real evidence that this\nchange still produces a launchable, self-contained app whose Settings \u2192\nModules view reports the installed plugins and loaded modules.\n\n**What you'll build:** This `logos-basecamp` commit, built as the real portable bundle (inspector-enabled `#bin-bundle-dir-inspector`) and driven through its sidebar (Applications, Package Manager, Settings \u2192 Modules) to inspect the installed UI plugins and the loaded core modules.\n\n**What you'll learn:**\n\n- How basecamp's portable `#bin-bundle-dir` packages the app, its Qt runtime, and a starter set of modules into one self-contained directory\n- How the inspector-enabled bundle variant lets logos-qt-mcp drive the real shippable app\n- How the sidebar navigates between the **Workspace** (MDI), **Applications** catalog, **Package Manager**, and **Settings**\n- How **Settings \u2192 Modules \u2192 UI Modules** lists the apps (UI plugins) installed in basecamp\n- How **Settings \u2192 Modules \u2192 Core Modules** shows which runtime modules are loaded, with live CPU/memory stats\n- How the **Package Manager** sidebar entry opens the bundled `package_manager_ui` plugin directly into the main content area\n- How to drive a headless Qt/QML app with logos-qt-mcp (wait, click, assert) and capture screenshots\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The bundle runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required. No network access is needed \u2014 everything inspected here ships inside the bundle.", "execs": []}, {"md": "## Dev app vs. portable bundle\n\nbasecamp has two main build outputs:\n\n```\n#app              -> result/bin/LogosBasecamp   the development app\n                     result/modules/ + plugins/  baked in next to the binary\n                     QML inspector ON by default\n\n#bin-bundle-dir   -> the portable, self-contained bundle you ship (this doc-test)\n                     Qt runtime + modules + plugins carried inside\n                     QML inspector OFF in the shipping build\n```\n\nThis doc-test uses the **bundle** \u2014 the self-contained directory basecamp\nships. Its starter modules and UI plugins are carried inside the bundle\nunder `modules/` (core modules) and `plugins/` (UI plugins), and the app\ndiscovers them relative to its own binary on launch. The\n**Settings \u2192 Modules** sub-view is the in-app window into both lists; the\n**Package Manager** sidebar entry surfaces the bundled\n`package_manager_ui` plugin directly. (The companion\n[`basecamp-modules`](./basecamp-modules.md) doc-test runs the identical\nwalk against the `#app` dev build.)", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the bundle's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Build the basecamp bundle\n\nBuild **this** basecamp commit's portable bundle \u2014 the self-contained\n`#bin-bundle-dir` directory you ship \u2014 and link it as `./result-bundle`. The\nbuild compiles the app and every bundled module/plugin through Nix, so the\nfirst build is slow (subsequent runs hit the cache).\n\n> To automate the UI, the doc-test actually builds the inspector-enabled\n> twin of this bundle (`#bin-bundle-dir-inspector`) \u2014 identical except the\n> QML inspector is compiled in. The inspector is never part of a shipping\n> build; the command shown below is the real `#bin-bundle-dir` one you would\n> run.\n\n> The `` in the URL pins the build to a specific commit: the\n> doc-test runner expands it to a concrete ref. Locally that is this\n> checkout's `HEAD` (see `run.sh`); in CI it is the commit being tested.\n> With no pin it falls back to the latest `master`.", "execs": []}, {"md": "### 2.1 Build the bundle\n\nThis is how you build the portable bundle you ship \u2014 the same command a\nrelease build uses:\n\n```bash\n# From inside the clone this is simply: nix build '.#bin-bundle-dir'\nnix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir' -o result-bundle\n```\n\nThe bundle is self-contained: the launcher lives at\n`result-bundle/bin/LogosBasecamp`, with `lib/` (Qt + app libraries),\n`modules/` (bundled core modules) and `plugins/` (bundled UI plugins)\nall alongside it.\n\n> This doc-test builds the same bundle with the QML inspector enabled so\n> it can automate the UI below. The inspector is **not** part of shipping\n> builds \u2014 `#bin-bundle-dir` (shown above) is what you release.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir-inspector' -o result-bundle", "status": "pass", "exit_code": 0, "output": "warning: ignoring untrusted flake configuration setting 'extra-substituters'.\nPass '--accept-flake-config' to trust it\nwarning: ignoring untrusted flake configuration setting 'extra-trusted-public-keys'.\nPass '--accept-flake-config' to trust it\nGC Warning: Repeated allocation of very large block (appr. size 408 KiB):\n\tMay lead to memory leak and poor performance\nGC Warning: Repeated allocation of very large block (appr. size 372 KiB):\n\tMay lead to memory leak and poor performance\nGC Warning: Repeated allocation of very large block (appr. size 288 KiB) ounts against the latest released counterpart\n\n[`logos-basecamp`](https://github.com/logos-co/logos-basecamp) hosts modules and\ntheir UI plugins that ship **independently** through the package manager: the\n`accounts_module` (core runtime) and `accounts_ui` (the QML app) are built,\nreleased, and downloaded as separate `.lgx` packages. Because they evolve on\ntheir own cadence, the risk is **cross-version drift** \u2014 a change to the module\nthat subtly breaks the released UI, or vice-versa.\n\nThe existing basecamp doc-tests only ever exercise the modules and plugins\n**baked into a single build**, so that drift ships green. This doc-test closes\nthat gap for the **accounts** pair. It builds **one** side fresh from source,\ndownloads the **other** side as the latest released package from the package\nmanager, drops both into a basecamp user-dir, launches the portable basecamp\nbundle against it, and drives the real Accounts app \u2014 in **both** directions:\n\n- **Variant A:** freshly-built **`accounts_module`** + latest-downloaded **`accounts_ui`**\n- **Variant B:** freshly-built **`accounts_ui`** + latest-downloaded **`accounts_module`**\n\nEverything is **portable**. A freshly-built component can only coexist in the\nsame process as a downloaded catalog package if both \u2014 and the host \u2014 are the\nportable variant (the dev `#app` / `#install` outputs rpath into `/nix/store`\nand will not load alongside a portable package). So the host is the portable\nbundle (`#bin-bundle-dir-inspector`, the inspector-enabled twin of the shippable\n`#bin-bundle-dir`), the fresh side is built with `#install-portable`, and the\ndownloaded side is the catalog's portable `.lgx`. This is exactly the real\ninstall scenario: a portable bundle with portable packages installed into it.\n\nbasecamp discovers extra modules/plugins from a **user-dir** passed via\n`--user-dir`: anything under `<user-dir>/modules/<name>/` and\n`<user-dir>/plugins/<name>/` is picked up at launch on top of the bundle's\nbaked-in set. We assemble that dir on disk from the fresh build + the download\n(the in-app package manager is **not** driven here \u2014 its catalog refresh stalls\nheadless), then open the Accounts app from the sidebar and create a couple of\nmnemonics. A green run is real evidence that this commit's source build of one\naccounts component still interoperates with the last released version of the\nother.\n\n**What you'll build:** The portable basecamp bundle (inspector-enabled `#bin-bundle-dir-inspector`), plus a freshly-built portable `accounts_module`/`accounts_ui`, combined in a user-dir with the latest released counterpart downloaded from the package manager, and driven through the Accounts app.\n\n**What you'll learn:**\n\n- How `accounts_module` and `accounts_ui` ship as separate packages and why cross-version compatibility needs its own test\n- Why fresh-built and downloaded packages must both be the portable variant to coexist in one process\n- How to build a component portably (`#install-portable`) into a `modules/<name>/` or `plugins/<name>/` layout\n- How to download the latest released package with `lgpd` and install it with `lgpm`\n- How basecamp's `--user-dir` discovers extra modules and UI plugins at launch\n- How to drive the Accounts app headless with logos-qt-mcp (open the app, create mnemonics) and capture screenshots\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.\n- **Network access.** Unlike the other basecamp doc-tests, this one downloads the latest released package from the package manager catalog, so it needs internet access.", "execs": []}, {"md": "## How the cross-version check works\n\nThe accounts feature is two packages that ship separately:\n\n```\naccounts_module   core runtime plugin   -> modules/accounts_module/\naccounts_ui       QML app (depends on accounts_module) -> plugins/accounts_ui/\n```\n\nTo catch drift between them, each variant of this doc-test pins one side to\n**today's source** and the other to the **latest release**:\n\n```\nVariant A : fresh accounts_module   + downloaded accounts_ui\nVariant B : fresh accounts_ui       + downloaded accounts_module\n```\n\nBoth are assembled into a basecamp **user-dir** (`modules/` + `plugins/`),\nand the **portable** bundle is launched with `--user-dir` pointed at it. The\nAccounts app then loads the freshly-built piece next to the released piece in\none process \u2014 which only works because everything is the portable variant.", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the bundle's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Build the package-manager CLIs\n\nThe download/install of the released counterpart is driven by the package\nmanager's CLIs: `lgpd` (downloader) fetches the latest `.lgx` from the\ncatalog, and `lgpm` (manager) installs it into the user-dir. We build them\nfrom their flakes \u2014 `lgpm` from the **portable** CLI (`#cli-portable`), so it\nselects the catalog's portable platform variant rather than a `-dev` one.", "execs": []}, {"md": "### 2.1 Build lgpd (package downloader)\n\n```bash\nnix build 'github:logos-co/logos-package-downloader#cli' -o result-lgpd\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-downloader#cli' -o result-lgpd", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/nix-bundle-appimage/7343f6df1ebab357f51f23dff0af9d7e468638cb?narHash=sha256-UEUlp3VRXBcj2YlOMTQdeW3qjyGJl2V3%2BGMf8IXwSWA%3D' into the Git cache...\nunpacking 'github:logos-co/nix-bundle-dir/cd214dbf15487d80967389847ae2210468be6ebf?narHash=sha256-bpaTvz//R8WFP5xnnDLv3a9l7unDmBwJjCewx3wCjzM%3D' into the Git cache...\nthis path will be fetched (0.0 KiB download, 1.1 MiB unpacked):\n  /nix/store/7k4hs9clsgwh8zkz0x1y8z0axjrz6fhr-logos-package-downloader-cli-1.0.0\ncopying path '/nix/store/7k4hs9clsgwh8zkz0x1y8z0axjrz6fhr-logos-package-downloader-cli-1.0.0' from 'https://cache.nix.logos.co/ci'...\n", "note": ""}]}, {"md": "### 2.2 Build lgpm (package manager, portable)\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli-portable' -o result-lgpm\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli-portable' -o result-lgpm", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: Build the basecamp bundle\n\nBuild **this** basecamp commit's portable bundle and link it as\n`./result-bundle`. This is the self-contained `#bin-bundle-dir` you ship; to\nautomate the UI we build its inspector-enabled twin\n(`#bin-bundle-dir-inspector`) \u2014 identical except the QML inspector is\ncompiled in. The bundle is the **host** the fresh + downloaded portable\npackages load into.\n\n> The `` in the URL pins the build to this commit (the doc-test\n> runner expands it; locally that is this checkout's `HEAD`, see `run.sh`).", "execs": []}, {"md": "### 3.1 Build the bundle\n\n```bash\n# From inside the clone this is simply: nix build '.#bin-bundle-dir'\nnix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir' -o result-bundle\n```", "execs": [{"kind": "run", "cmd": "nix bu ui\n\n`lgpd` fetches the latest `accounts_ui` `.lgx` from the package manager\ncatalog into `./dl-accA`.\n\n```bash\nrm -rf dl-accA && mkdir -p dl-accA && ./result-lgpd/bin/lgpd download accounts_ui -o dl-accA && ls dl-accA\n```", "execs": [{"kind": "run", "cmd": "rm -rf dl-accA && mkdir -p dl-accA && ./result-lgpd/bin/lgpd download accounts_ui -o dl-accA && ls dl-accA", "status": "pass", "exit_code": 0, "output": "Downloading accounts_ui... done\n  -> dl-accA/accounts_ui-1.0.0.lgx\naccounts_ui-1.0.0.lgx\n", "note": ""}]}, {"md": "### 4.3 Assemble the user-dir\n\nCopy the freshly-built module into the user-dir's `modules/`, and install\nthe downloaded UI `.lgx` into its `plugins/` with `lgpm`.\n\n```bash\nchmod -R u+w testdata/acc-A 2>/dev/null || true\nrm -rf testdata/acc-A\nmkdir -p testdata/acc-A/modules testdata/acc-A/plugins\ncp -r result-accA-mod/modules/accounts_module testdata/acc-A/modules/\nchmod -R u+w testdata/acc-A\n./result-lgpm/bin/lgpm --modules-dir testdata/acc-A/modules --ui-plugins-dir testdata/acc-A/plugins install --file dl-accA/*.lgx\necho \"--- modules ---\"; ls testdata/acc-A/modules\necho \"--- plugins ---\"; ls testdata/acc-A/plugins\n\n```", "execs": [{"kind": "run", "cmd": "chmod -R u+w testdata/acc-A 2>/dev/null || true\nrm -rf testdata/acc-A\nmkdir -p testdata/acc-A/modules testdata/acc-A/plugins\ncp -r result-accA-mod/modules/accounts_module testdata/acc-A/modules/\nchmod -R u+w testdata/acc-A\n./result-lgpm/bin/lgpm --modules-dir testdata/acc-A/modules --ui-plugins-dir testdata/acc-A/plugins install --file dl-accA/*.lgx\necho \"--- modules ---\"; ls testdata/acc-A/modules\necho \"--- plugins ---\"; ls testdata/acc-A/plugins\n", "status": "pass", "exit_code": 0, "output": "Installing from file: dl-accA/accounts_ui-1.0.0.lgx...Warning: Package is unsigned: dl-accA/accounts_ui-1.0.0.lgx\n done\nInstalled to: testdata/acc-A/plugins\n--- modules ---\naccounts_module\n--- plugins ---\naccounts_ui\n", "note": ""}]}, {"md": "### 4.4 Launch th ds the released `accounts_module`.\n\n![Accounts Manager loads](images/xver-accB-open.png)\n\n![First mnemonic is created](images/xver-accB-mnemonic1.png)\n\n![Second mnemonic is created](images/xver-accB-mnemonic2.png)\n\nA green Variant B means today's `accounts_ui` source still works against\nthe last released `accounts_module`. Together with Variant A, the accounts\npair is verified in both directions.", "execs": [{"kind": "ui_test", "cmd": "./result-bundle/bin/LogosBasecamp --user-dir ./testdata/acc-B\n\n# test actions:\n- App window opens with the sidebar visible: wait for ['Applications', 'Settings']\n- The accounts app appears in the sidebar: wait for ['accounts_ui']\n- Open the Accounts app: click 'accounts_ui'\n- Accounts Manager loads: wait for ['Accounts Manager', 'Create Random Mnemonic']\n- Create the first mnemonic: click 'Create Random Mnemonic'\n- First mnemonic is created: wait for ['Status: Mnemonic created successfully']\n- Create a second mnemonic: click 'Create Random Mnemonic'\n- Second mnemonic is created: wait for ['Status: Mnemonic created successfully']", "status": "fail", "output": "\nRunning 1 test(s)...\n\n  \u001b[31m\u2717\u001b[0m Cross-version check: freshly-built accounts against the latest released counterpart: Launch the bundle and create mnemonics\n    click(\"accounts_ui\"): No clickable element found with text 'accounts_ui'\n\n0 passed, 1 failed\n\n\n\n--- app log ---\n] ModuleProxy: callRemoteMethod \"resolveFlatDependents\" args: QList(QVariant(QString, \"package_manager\"), QVariant(bool, true))\n[2026-06-22 14:22:21.004] [info] [logos] [package_manager] ModuleProxy: callRemoteMethod \"resolveFlatDependencies\" args: QList(QVariant(QString, \"package_manager_ui\"), QVariant(bool, true))\n[2026-06-22 14:22:21.005] [info] [logos] [package_manager] ModuleProxy: callRemoteMethod \"resolveFlatDependents\" args: QList(QVariant(QString, \"package_manager_ui\"), QVariant(bool, true))\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[2026-06-22 14:22:21.017] [info] [logos] [package_downloader] ModuleProxy: callRemoteMethod \"getCatalog\" args: QList()\n[QmlInspector] Client connected from \"::1\"\n[QmlInspector] Client disconnected\n[LogosObject] Destroying RemoteLogosObject 0\n[LogosObject] Destroying RemoteLogosObject 0\n[QmlInspector] Client connected from \"::1\"\n[QmlInspector] Client disconnected", "note": "UI tests failed"}]}]}, {"meta": {"name": "Cross-version check: freshly-built chat against the latest released counterpart", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Cross-version check: freshly-built chat against the latest released counterpart\n\n> **\u26a0\ufe0f Partial coverage.** This chat cross-version check currently goes as far\n> as **opening the chat app and confirming it initializes** (the chat node comes\n> up and the UI reaches **Connected**), capturing a screenshot. The full\n> messaging flow \u2014 get intro bundle \u2192 start a conversation \u2192 send messages \u2014 is\n> a documented follow-up (see the WIP block in the spec). `chat_module` runs a\n> real Waku node, so reaching **Connected** depends on the run environment's\n> network.\n\n[`logos-basecamp`](https://github.com/logos-co/logos-basecamp) hosts the\n`chat_module` (core runtime, which runs a real Waku node) and `chat_ui` (the QML\napp) as **separate** packages that ship independently through the package\nmanager. As with accounts, they can drift apart, so this doc-test checks a\nfreshly-built side against the latest released counterpart in **both**\ndirections:\n\n- **Variant A:** freshly-built **`chat_module`** + latest-downloaded **`chat_ui`**\n- **Variant B:** freshly-built **`chat_ui`** + latest-downloaded **`chat_module`**\n\nEverything is **portable**: a freshly-built component can only coexist with a\ndownloaded catalog package in one process if both \u2014 and the host \u2014 are the\nportable variant. So the host is the portable bundle\n(`#bin-bundle-dir-inspector`, the inspector-enabled twin of the shippable\n`#bin-bundle-dir`), the fresh side is built with `#install-portable`, and the\ndownloaded side is the catalog's portable `.lgx`.\n\nBoth sides are assembled into a basecamp **user-dir** (discovered via\n`--user-dir`: `<user-dir>/modules/<name>/` + `<user-dir>/plugins/<name>/`), the\nportable bundle is launched against it, the chat app is opened from the sidebar,\nand we wait for it to initialize. A green run is evidence that this commit's\nsource build of one chat component still loads and initializes next to the last\nreleased version of the other.\n\n**What you'll build:** The portable basecamp bundle (inspector-enabled `#bin-bundle-dir-inspector`), plus a freshly-built portable `chat_module`/`chat_ui`, combined in a user-dir with the latest released counterpart downloaded from the package manager, and driven to confirm the chat app initializes.\n\n**What you'll learn:**\n\n- How `chat_module` and `chat_ui` ship as separate packages and why cross-version compatibility needs its own test\n- Why fresh-built and downloaded packages must both be the portable variant to coexist in one process\n- How to build a component portably (`#install-portable`) and download its counterpart with `lgpd`/`lgpm`\n- How basecamp's `--user-dir` discovers extra modules and UI plugins at launch\n- How to confirm the chat app initializes (the Waku node comes up and the UI reaches \"Connected\") headless with logos-qt-mcp\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.\n- **Network access.** This doc-test downloads the latest released package from the package manager catalog, and `chat_module` starts a real Waku node \u2014 both need internet access.", "execs": []}, {"md": "## How the cross-version check works\n\nThe chat feature is two packages that ship separately:\n\n```\nchat_module   core runtime plugin (runs a real Waku node) -> modules/chat_module/\nchat_ui       QML app (depends on chat_module)            -> plugins/chat_ui/\n```\n\nEach variant pins one side to **today's source** and the other to the\n**latest release**:\n\n```\nVariant A : fresh chat_module + downloaded chat_ui\nVariant B : fresh chat_ui     + downloaded chat_module\n```\n\nBoth are assembled into a basecamp **user-dir**, and the **portable** bundle\nis launched with `--user-dir` pointed at it \u2014 so the freshly-built piece\ninitializes next to the released piece in one process.", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the bundle's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Build the package-manager CLIs\n\n`lgpd` (downloader) fetches the latest `.lgx` from the catalog, and `lgpm`\n(manager) installs it into the user-dir. We build them from their flakes \u2014\n`lgpm` from the **portable** CLI (`#cli-portable`), so it selects the\ncatalog's portable platform variant rather than a `-dev` one.", "execs": []}, {"md": "### 2.1 Build lgpd (package downloader)\n\n```bash\nnix build 'github:logos-co/logos-package-downloader#cli' -o result-lgpd\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-downloader#cli' -o result-lgpd", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 2.2 Build lgpm (package manager, portable)\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli-portable' -o result-lgpm\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli-portable' -o result-lgpm", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: Build the basecamp bundle\n\nBuild **this** basecamp commit's portable bundle and link it as\n`./result-bundle` \u2014 the inspector-enabled twin (`#bin-bundle-dir-inspector`)\nof the shippable `#bin-bundle-dir`, the host the fresh + downloaded portable\npackages load into.", "execs": []}, {"md": "### 3.1 Build the bundle\n\n```bash\n# From inside the clone this is simply: nix build '.#bin-bundle-dir'\nnix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir' -o result-bundle\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-basecamp/b962d5d1017b9466c79e363a7a0279b65376f944#bin-bundle-dir-inspector' -o result-bundle", "status": "pass", "exit_code": 0, "output": "warning: ignoring untrusted flake configuration setting 'extra-substituters'.\nPass '--accept-flake-config' to trust it\nwarning: ignoring untrusted flake configuration setting 'extra-trusted-public-keys'.\nPass '--accept-flake-config' to trust it\n", "note": ""}]}, {"md": "## Step 4: Variant A \u2014 fresh chat_module + latest chat_ui\n\nBuild `chat_module` fresh from source as a **portable** install, download the\nlatest released `chat_ui`, and assemble both into `./testdata/chat-A`.", "execs": []}, {"md": "### 4.1 Build the fresh chat_module (portable)\n\n```bash\nnix build 'github:logos-co/logos-chat-module#install-portable' -o result-chatA-mod\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-chat-module#install-portable' -o result-chatA-mod", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-chat-module/b59ff27b3e499ed2506b0446f4c5c86fe546a932' into the Git cache...\nunpacking 'github:logos-co/logos-module-builder/1247e5c0cc8823a75412e82b2c1ff2409bb1eacd?narHash=sha256-QMdoBJfwQzXemrGKiWPGY797DQ6aH/NuzK0T2SNP%2Bho%3D' into the Git cache...\ncopying path '/nix/store/i6bhrxsfzr42bcayg6fij431rr2pwa9b-source' from 'https://cache.nix.logos.co/ci'...\ncopying path '/nix/store/dx2qikyb4dyb6hbdfywbmsyla0z5a1h3-source' from 'https://cache.nixos.org'...\nunpacking 'github:oxalica/rust-overlay/85078369717bdbe1f266c9eaad5e66956fb6feea?narHash=sha256-4zOvSi0WkS2WAaoJtM28wECtS9S%2BL38CPYbhF%2BwINDA%3D' into the Git cache...\nthis path will be fetched (0.0 KiB download, 26.2 MiB unpacked):\n  /nix/store/c6gaf4kwy678lslizcn0gqq7xk267qxk-logos-chat_module-module-lib-install\ncopying path '/nix/store/c6gaf4kwy678lslizcn0gqq7xk267qxk-logos-chat_module-module-lib-install' from 'https://cache.nix.logos.co/ci'...\n", "note": ""}]}, {"md": "### 4.2 Download the latest released chat_ui\n\n```bash\nrm -rf dl-chatA && mkdir -p dl-chatA && ./result-lgpd/bin/lgpd download chat_ui -o dl-chatA && ls dl-chatA\n```", "execs": [{"kind": "run", "cmd": "rm -rf dl-chatA && mkdir -p dl-chatA && ./result-lgpd/bin/lgpd download chat_ui -o dl-chatA && ls dl-chatA", "status": "pass", "exit_code": 0, "output": "Downloading chat_ui... done\n  -> dl-chatA/chat_ui-1.0.0.lgx\nchat_ui-1.0.0.lgx\n", "note": ""}]}, {"md": "### 4.3 Assemble the user-dir\n\n```bash\nchmod -R u+w testdata/chat-A 2>/dev/null || true\nrm -rf testdata/chat-A\nmkdir -p testdata/chat-A/modules testdata/chat-A/plugins\ncp -r result-chatA-mod/modules/chat_module testdata/chat-A/modules/\nchmod -R u+w testdata/chat-A\n./result-lgpm/bin/lgpm --modules-dir testdata/chat-A/modules --ui-plugins-dir testdata/chat-A/plugins install --file dl-chatA/*.lgx\necho \"--- modules ---\"; ls testdata/chat-A/modules\necho \"--- plugins ---\"; ls testdata/chat-A/plugins\n\n```", "execs": [{"kind": "run", "cmd": "chmod -R u+w testdata/chat-A 2>/dev/null || true\nrm -rf testdata/chat-A\nmkdir -p testdata/chat-A/modules testdata/chat-A/plugins\ncp -r result-chatA-mod/modules/chat_module testdata/chat-A/modules/\nchmod -R u+w testdata/chat-A\n./result-lgpm/bin/lgpm --modules-dir testdata/chat-A/modules --ui-plugins-dir testdata/chat-A/plugins install --file dl-chatA/*.lgx\necho \"--- modules ---\"; ls testdata/chat-A/modules\necho \"--- plugins ---\"; ls testdata/chat-A/plugins\n", "status": "pass", "exit_code": 0, "output": "Installing from file: dl-chatA/chat_ui-1.0.0.lgx...Warning: Package is unsigned: dl-chatA/chat_ui-1.0.0.lgx\n done\nInstalled to: testdata/chat-A/plugins\n--- modules ---\nchat_module\n--- plugins ---\nchat_ui\n", "note": ""}]}, {"md": "### 4.4 Launch the bundle and confirm chat initializes\n\nLaunch the portable bundle against `./testdata/chat-A`, open the chat app\nfrom the sidebar, and wait for the chat node to come up \u2014 the released\n`chat_ui` initializing the freshly-built `chat_module`'s Waku node.\n\n```bash\n./result-bundle/bin/LogosBasecamp --user-dir ./testdata/chat-A\n```\n\n![App window opens with the sidebar visible](data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABAAAAAMACAIAAAA12IJaAAAACXBIWXMAAA7EAAAOxAGVKw4bAAAgAElEQVR4nOzdeWAU9d348e/szh7JZnOSi5AsCRFWjiogxQNQPFC0eCulPvWk99Nqfx5t9bHWPu3T1to+tbXaqvVR9PF6FFERpCpyKSAFBDlWIQlLArlDks0m2d3Zmd8fk27XJLssySYbsu/XH+1k5jvf+cwk6vcz8z2k/Px8AQAAACA5GBIdAAAAAI <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
