x.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required. No network access is needed \u2014 everything inspected here ships inside the dev build.", "execs": []}, {"md": "## Dev app vs. portable bundle\n\nbasecamp has two main build outputs:\n\n```\n#app              -> result/bin/LogosBasecamp   the development app (this doc-test)\n                     result/modules/ + plugins/  baked in next to the binary\n                     QML inspector ON by default\n\n#bin-bundle-dir   -> the portable, self-contained bundle you ship\n                     (Qt runtime carried inside, inspector OFF)\n```\n\nThis doc-test uses `#app` \u2014 what you get from a plain `nix build` while\ndeveloping basecamp. Its starter modules and UI plugins are installed at\nbuild time into `result/modules/` (core modules) and `result/plugins/`\n(UI plugins), and the app discovers them relative to its own binary on\nlaunch. The **Settings \u2192 Modules** sub-view is the in-app window into both\nlists; the **Package Manager** sidebar entry surfaces the bundled\n`package_manager_ui` plugin directly.", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the app's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-qt-mcp/c5223b4b640add09e461983b8fddbd12c8b31f4f' into the Git cache...\ncopying path '/nix/store/jc3mfa7ybzh32bkvdj5xiib1vkx8jy6x-source' from 'https://cache.nixos.org'...\nthese 28 paths will be fet inding the catalog rows / Install button by visible\n> text is unreliable. The likely fix is to expose stable **`objectName`s** on\n> those UI elements so the test can target them directly (as it already does\n> for `pmui.BackendStore`), plus an app-side fix for the stuck catalog load.\n\n[`logos-basecamp`](https://github.com/logos-co/logos-basecamp) is the Logos\ndesktop application shell \u2014 a Qt/QML app with a sidebar of section buttons\n(Workspace, Applications, Package Manager, Settings), an in-app **Applications**\ncatalog, and a **Settings** view whose **Modules** sub-tab lists the UI plugins\ninstalled in the app and the core modules loaded into its runtime. This\ndoc-test builds **this** basecamp commit as its real, shippable **portable\nbundle**, launches that bundle headless, and drives its UI to inspect what is\ninstalled and loaded out of the box.\n\nThis is the bundle twin of the dev-app doc-test\n([`basecamp-modules`](./basecamp-modules.md)): the exact same sidebar walk,\nbut driving the self-contained `#bin-bundle-dir` directory you ship instead of\nthe plain `nix build` dev binary. The bundle carries the app, its Qt runtime,\nand a starter set of pre-installed modules/plugins (the main UI, the package\nmanager, package downloader, capability module, and the `package_manager_ui`\nplugin) all inside it \u2014 no `/nix/store` needed at runtime.\n\nThe shipping bundle is `#bin-bundle-dir`, with the QML inspector compiled OFF.\nTo automate the UI here we build the inspector-enabled twin\n(`#bin-bundle-dir-inspector` \u2014 `dirBundler appDistributedWithInspector` in\n`flake.nix`): the *same* bundle, just compiled with the QML inspector switched\non so [`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) can drive it\nheadlessly. The inspector is a compile-time switch \u2014 off in the shipping\nRelease build, on here.\n\nThe flow this doc-test exercises is the everyday \"what's in my app?\" check:\n\n1. Launch the bundle and land on the **Workspace** (the empty MDI tab area).\n2. Open the **Applications** view from the sidebar \u2014 basecamp's catalog of\n   installable apps.\n3. Open the **Package Manager** from the sidebar \u2014 clicking the sidebar entry\n   opens the bundled `package_manager_ui` plugin directly into the main\n   content area.\n4. Open **Settings \u2192 Modules \u2192 UI Modules** \u2014 the apps (UI plugins) installed\n   in basecamp, e.g. the main UI and the package manager UI.\n5. Switch to **Settings \u2192 Modules \u2192 Core Modules** \u2014 the background modules\n   loaded into the runtime (package manager, package downloader, capability\n   module) shown as **(Loaded)** with live CPU/memory stats.\n\nThe bundle is launched headless (`QT_QPA_PLATFORM=offscreen`) and driven through\nits QML inspector: we wait for elements, click sidebar items and tabs, assert\non the rendered text, and capture a screenshot at each step. Because the bundle\nis built from the commit under test, a green run is real evidence that this\nchange still produces a launchable, self-contained app whose Settings \u2192\nModules view reports the installed plugins and loaded modules.\n\n**What you'll build:** This `logos-basecamp` commit, built as the real portable bundle (inspector-enabled `#bin-bundle-dir-inspector`) and driven through its sidebar (Applications, Package Manager, Settings \u2192 Modules) to inspect the installed UI plugins and the loaded core modules.\n\n**What you'll learn:**\n\n- How basecamp's portable `#bin-bundle-dir` packages the app, its Qt runtime, and a starter set of modules into one self-contained directory\n- How the inspector-enabled bundle variant lets logos-qt-mcp drive the real shippable app\n- How the sidebar navigates between the **Workspace** (MDI), **Applications** catalog, **Package Manager**, and **Settings**\n- How **Settings \u2192 Modules \u2192 UI Modules** lists the apps (UI plugins) installed in basecamp\n- How **Settings \u2192 Modules \u2192 Core Modules** shows which runtime modules are loaded, with live CPU/memory stats\n- How the **Package Manager** sidebar entry opens the bundled `package_manager_ui` plugin directly into the main content area\n- How to drive a headless Qt/QML app with logos-qt-mcp (wait, click, assert) and capture screenshots\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The bundle runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required. No network access is needed \u2014 everything inspected here ships inside the bundle.", "execs": []}, {"md": "## Dev app vs. portable bundle\n\nbasecamp has two main build outputs:\n\n```\n#app              -> result/bin/LogosBasecamp   the development app\n                     result/modules/ + plugins/  baked in next to the binary\n                     QML inspector ON by default\n\n#bin-bundle-dir   -> the portable, self-contained bundle you ship (this doc-test)\n                     Qt runtime + modules + plugins carried inside\n                     QML inspector OFF in the shipping build\n```\n\nThis doc-test uses the **bundle** \u2014 the self-contained directory basecamp\nships. Its starter modules and UI plugins are carried inside the bundle\nunder `modules/` (core modules) and `plugins/` (UI plugins), and the app\ndiscovers them relative to its own binary on launch. The\n**Settings \u2192 Modules** sub-view is the in-app window into both lists; the\n**Package Manager** sidebar entry surfaces the bundled\n`package_manager_ui` plugin directly. (The companion\n[`basecamp-modules`](./basecamp-modules.md) doc-test runs the identical\nwalk against the `#app` dev build.)", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the bundle's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build \"${QT_MCP_FLAKE:-github:logos-co/logos-qt-mcp}\" -o result-mcp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Build the basecamp bundle\n\nBuild **this** basecamp commit's portable bundle \u2014 the self-contained\n`#bin-bundle-dir` directory you ship \u2014 and link it as `./result-bundle`. The\nbuild compiles the app and every bundled module/plugin through Nix, so the\nfirst build is slow (subsequent runs hit the cache).\n\n> To automate the UI, the doc-test actually builds the inspector-enabled\n> twin of this bundle (`#bin-bundle-dir-inspector`) \u2014 identical except the\n> QML inspector is compiled in. The inspector is never part of a shipping\n> build; the command shown below is the real `#bin-bundle-dir` one you would\n> run.\n\n> The `` in the URL pins the build to a specific commit: the\n> doc-test runner expands it to a concrete ref. Locally that is this\n> checkout's `HEAD` (see `run.sh`); in CI it is the commit being tested.\n> With no pin it falls back to the latest `master`.", "execs": []}, {"md": "### 2.1 Build the bundle\n\nThis is how you build the portable bundle you ship \u2014 the same command a\nrelease build uses:\n\n```bash\n# From inside the clone this is simply: nix build '.#bin-bundle-dir'\nnix build 'github:logos-co/logos-basecamp/03715a51a456731d3ddb2dc8e51badc7d3c4ac69#bin-bundle-dir' -o result-bundle\n```\n\nThe bundle is self-contained: the launcher lives at\n`result-bundle/bin/LogosBasecamp`, with `lib/` (Qt + app libraries),\n`modules/` (bundled core modules) and `plugins/` (bundled UI plugins)\nall alongside it.\n\n> This doc-test builds the s <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
