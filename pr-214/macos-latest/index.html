s **(Loaded)** with live CPU/memory stats, and\nclicking **package_manager_ui** in the sidebar launches the installed UI\nplugin in its own ui-host process (captured as a screenshot), and clicking\n**Modules** again navigates straight back to the Modules section (reopened\non the Core Modules tab it was left on). A green run is end-to-end proof\nthat this commit builds a launchable dev app whose Modules view faithfully\nreports what is installed and loaded. The captured screenshots are embedded\nabove and in the CI report.", "execs": [{"kind": "ui_test", "cmd": "./result-app/bin/LogosBasecamp\n\n# test actions:\n- App window opens on the Dashboard: wait for ['Dashboard']\n- Open the Modules view: click 'Modules'\n- UI Modules tab loads: wait for ['UI Modules', 'Available UI plugins in the system']\n- Installed apps are listed: wait for ['main_ui', 'package_manager_ui']\n- Open the Core Modules tab: click 'Core Modules'\n- Core Modules tab loads: wait for ['Core Modules', 'All available plugins in the system']\n- Core modules are present: wait for ['package_manager', 'capability_module']\n- Core modules report as loaded: wait for ['(Loaded)', 'Unload Plugin']\n- Let the module stats populate: sleep 3000ms\n- Open the package manager app from the sidebar: click 'package_manager_ui'\n- Let the package manager view render, then capture it: sleep 10000ms\n- Return to the Modules section: click 'Modules'\n- Modules section is shown again \u2014 capture it: sleep 4000ms", "status": "fail", "output": "/nix/store/55976waa157aqb1ncbwm6b8sa64b6m3h-bash-5.3p9/bin/sh: line 1: ./result-app/bin/LogosBasecamp: No such file or directory", "note": "app exited (code 127) before inspector opened on port 3768"}]}]}, {"meta": {"name": "Exploring Installed Apps and Loaded Modules in the Basecamp Bundle", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Exploring Installed Apps and Loaded Modules in the Basecamp Bundle\n\n> **\u26a0\ufe0f Work in progress.** This doc-test currently only walks the Modules view\n> and opens the package manager. The goal is to also drive a **real install**\n> through the package manager \u2014 open `package_manager_ui`, browse the live\n> catalog, select the **accounts module** and **accounts UI**, click **Install**,\n> and verify they install \u2014 but that flow isn't covered yet. Headless, the\n> catalog never finishes populating (the `getValidVariants` reply doesn't get\n> back to the package-manager-ui backend, so the view stays stuck loading), and\n> finding the catalog rows / Install button by visible text is unreliable. The\n> likely fix is to expose stable **`objectName`s** on those UI elements so the\n> test can target them directly (as it already does for `pmui.BackendStore`),\n> plus an app-side fix for the stuck catalog load.\n\n[`logos-basecamp`](https://github.com/logos-co/logos-basecamp) is the Logos\ndesktop application shell \u2014 a Qt/QML app with a plugin sidebar, a **Dashboard**,\nand a **Modules** view that lists the UI plugins installed in the app and the\ncore modules loaded into its runtime. This doc-test builds **this** basecamp\ncommit as its real, shippable **portable bundle**, launches that bundle\nheadless, and drives its UI to inspect what is installed and loaded out of the\nbox.\n\nThis is the bundle twin of the dev-app doc-test\n([`basecamp-modules`](./basecamp-modules.md)): the exact same Modules-view walk,\nbut driving the self-contained `#bin-bundle-dir` directory you ship instead of\nthe plain `nix build` dev binary. The bundle carries the app, its Qt runtime,\nand a starter set of pre-installed modules/plugins (the main UI, the package\nmanager, package downloader, capability module, and the `package_manager_ui`\nplugin) all inside it \u2014 no `/nix/store` needed at runtime.\n\nThe shipping bundle is `#bin-bundle-dir`, with the QML inspector compiled OFF.\nTo automate the UI here we build the inspector-enabled twin\n(`#bin-bundle-dir-inspector` \u2014 `dirBundler appDistributedWithInspector` in\n`flake.nix`): the *same* bundle, just compiled with the QML inspector switched\non so [`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) can drive it\nheadlessly. The inspector is a compile-time switch \u2014 off in the shipping\nRelease build, on here.\n\nThe flow this doc-test exercises is the everyday \"what's in my app?\" check:\n\n1. Launch the bundle and land on the **Dashboard**.\n2. Open the **Modules** view and look at the **UI Modules** tab \u2014 the apps\n   (UI plugins) installed in basecamp, e.g. the main UI and the package\n   manager UI.\n3. Switch to the **Core Modules** tab \u2014 the background modules loaded into the\n   runtime (package manager, package downloader, capability module) shown as\n   **(Loaded)** with live CPU/memory stats.\n4. Open one of the installed apps (the **package_manager_ui**) from the sidebar\n   to confirm an installed UI plugin actually opens.\n\nThe bundle is launched headless (`QT_QPA_PLATFORM=offscreen`) and driven through\nits QML inspector: we wait for elements, click tabs and sidebar items, assert\non the rendered text, and capture a screenshot at each step. Because the bundle\nis built from the commit under test, a green run is real evidence that this\nchange still produces a launchable, self-contained app whose Modules view\nreports the installed plugins and loaded modules.\n\n**What you'll build:** This `logos-basecamp` commit, built as the real portable bundle (inspector-enabled `#bin-bundle-dir-inspector`) and driven through its Modules view to inspect the installed UI plugins and the loaded core modules.\n\n**What you'll learn:**\n\n- How basecamp's portable `#bin-bundle-dir` packages the app, its Qt runtime, and a starter set of modules into one self-contained directory\n- How the inspector-enabled bundle variant lets logos-qt-mcp drive the real shippable app\n- How the **Modules > UI Modules** tab lists the apps (UI plugins) installed in basecamp\n- How the **Modules > Core Modules** tab shows which runtime modules are loaded, with live CPU/memory stats\n- How an installed UI plugin opens from the sidebar\n- How to drive a headless Qt/QML app with logos-qt-mcp (wait, click, assert) and capture screenshots\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The bundle runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required. No network access is needed \u2014 everything inspected here ships inside the bundle.", "execs": []}, {"md": "## Dev app vs. portable bundle\n\nbasecamp has two main build outputs:\n\n```\n#app              -> result/bin/LogosBasecamp   the development app\n                     result/modules/ + plugins/  baked in next to the binary\n                     QML inspector ON by default\n\n#bin-bundle-dir   -> the portable, self-contained bundle you ship (this doc-test)\n                     Qt runtime + modules + plugins carried inside\n                     QML inspector OFF in the shipping build\n```\n\nThis doc-test uses the **bundle** \u2014 the self-contained directory basecamp\nships. Its starter modules and UI plugins are carried inside the bundle\nunder `modules/` (core modules) and `plugins/` (UI plugins), and the app\ndiscovers them relative to its own binary on launch. The **Modules** view is\nthe in-app window into both lists. (The companion\n[`basecamp-modules`](./basecamp-modules.md) doc-test runs the identical walk\nagainst the `#app` dev build.)", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the bundle's QML inspector and drive it. Build it\nonce hown above) is what you release.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-basecamp/09094e7208a47c2a0c6fab86318589ea2d9276bb#bin-bundle-dir-inspector' -o result-bundle", "status": "fail", "exit_code": 1, "output": "warning: input 'logos-cpp-sdk' has an override for a non-existent input 'logos-protocol'\nerror:\n       \u2026 while updating the lock file of flake 'github:logos-co/logos-basecamp/09094e7208a47c2a0c6fab86318589ea2d9276bb'\n\n       \u2026 while updating the flake input 'logos-qt-sdk'\n\n       \u2026 while fetching the input 'github:logos-co/logos-qt-sdk'\n\n       error: unable to download 'https://api.github.com/repos/logos-co/logos-qt-sdk/commits/HEAD': HTTP error 404\n\n       response body:\n\n       {\n         \"message\": \"Not Found\",\n         \"documentation_url\": \"https://docs.github.com/rest/commits/commits#get-a-commit\",\n         \"status\": \"404\"\n       }\n", "note": "exit code 1"}]}, {"md": "### 2.2 Confirm the bundled UI plugins\n\nThe UI plugins the Modules view will list are carried under\n`plugins/` \u2014 confirm the main UI and the package manager UI shipped in\nthe bundle:\n\n```bash\nls result-bundle/plugins\n```", "execs": [{"kind": "run", "cmd": "ls result-bundle/plugins", "status": "fail", "exit_code": 1, "output": "ls: result-bundle/plugins: No such file or directory\n", "note": "exit code 1"}]}, {"md": "### 2.3 Confirm the bundled core modules\n\nThe core modules the runtime loads are carried under `modules/` \u2014\nconfirm the package manager, package downloader, and capability module\nare present:\n\n```bash\nls result-bundle/modules\n```", "execs": [{"kind": "run", "cmd": "ls result-bundle/modules", "status": "fail", "exit_code": 1, "output": "ls: result-bundle/modules: No such file or directory\n", "note": "exit code 1"}]}, {"md": "## Step 3: Launch the bundle and explore its Modules view\n\nLaunch the bundle binary headless and drive its UI: land on the Dashboard,\nopen the **Modules** view to see the installed apps (UI plugins) and the\nloaded core modules, then open one of the installed apps from the sidebar \u2014\neach interaction a real round-trip through this basecamp bundle.", "execs": []}, {"md": "### 3.1 Launch and drive the bundle\n\n```bash\n./result-bundle/bin/LogosBasecamp\n```\n\nThe bundle launches headless and lands on the **Dashboard**.\n\n![App window opens on the Dashboard](images/bundle-launch.png)\n\nThe **Modules \u2192 UI Modules** tab lists the UI plugins installed in the app.\n\n![UI Modules tab loads](images/bundle-ui-modules.png)\n\nThe installed apps appear as rows \u2014 the main UI and the package manager UI.\n\n![Installed apps are listed](images/bundle-ui-modules-list.png)\n\nThe **Core Modules** tab shows the background modules loaded into the runtime.\n\n![Core Modules tab loads](images/bundle-core-modules.png)\n\nThe bundled core modules report as **(Loaded)** with an Unload Plugin action.\n\n![Core modules report as loaded](images/bundle-core-loaded.png)\n\nAfter a stats tick, each loaded module row carries live CPU / memory usage.\n\n![Let the module stats populate](images/bundle-core-stats.png)\n\nOpening **package_manager_ui** from the sidebar launches the installed app.\n\n![Let the package manager view render, then capture it](images/bundle-app-open.png)\n\nClicking **Modules** navigates back to the Modules section (Core Modules tab).\n\n![Modules section is shown again \u2014 capture it](images/bundle-back-to-modules.png)\n\nEvery step here is a real action against this basecamp bundle: opening\n**Modules** shows the **UI Modules** tab listing the installed apps\n(`main_ui`, `package_manager_ui`), the **Core Modules** tab reports the\nbundled runtime modules (`package_manager`, `package_downloader`,\n`capability_module`) as **(Loaded)** with live CPU/memory stats, and\nclicking **package_manager_ui** in the sidebar opens the installed\npackage manager UI (captured as a screenshot), and clicking **Modules**\nagain navigates straight back to the Modules section (reopened on the\nCore Modules tab it was left on). A green run is end-to-end proof that\nthis commit builds a launchable, self-contained bundle whose Modules view\nfaithfully reports what is installed and loaded. The captured screenshots\nare embedded above and in the CI report.", "execs": [{"kind": "ui_test", "cmd": "./result-bundle/bin/LogosBasecamp\n\n# test actions:\n- App window opens on the Dashboard: wait for ['Dashboard']\n- Open the Modules view: click 'Modules'\n- UI Modules tab loads: wait for ['UI Modules', 'Available UI plugins in the system']\n- Installed apps are listed: wait for ['main_ui', 'package_manager_ui']\n- Open the Core Modules tab: click 'Core Modules'\n- Core Modules tab loads: wait for ['Core Modules', 'All available plugins in the system']\n- Core modules are present: wait for ['package_manager', 'capability_module']\n- Core modules report as loaded: wait for ['(Loaded)', 'Unload Plugin']\n- Let the module stats populate: sleep 3000ms\n- Open the package manager app from the sidebar: click 'package_manager_ui'\n- Let the package manager view render, then capture it: sleep 10000ms\n- Return to the Modules section: click 'Modules'\n- Modules section is shown again \u2014 capture it: sleep 4000ms", "status": "fail", "output": "/nix/store/55976waa157aqb1ncbwm6b8sa64b6m3h-bash-5.3p9/bin/sh: line 1: ./result-bundle/bin/LogosBasecamp: No such file or directory", "note": "app exited (code 127) before inspector opened on port 3768"}]}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
